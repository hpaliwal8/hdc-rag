paths:
  questions_path: data/processed/questions.jsonl
  outputs_dir: data/outputs

baseline:
  mode: custom  # options: dummy | custom

llm:
  provider: ollama
  endpoint: http://localhost:11434
  model: ministral-3:8b
  dev_model: ministral-3:3b
  use_dev_model: false
  temperature: 0.2
  top_p: 0.9
  max_tokens: 256
  prompt:
    baseline_system: "You are a precise, factual assistant. Answer concisely and do not speculate."
    baseline_style: "Answer the question concisely and factually. If you are unsure, say you don't know."
